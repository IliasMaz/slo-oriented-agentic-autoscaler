# This is the Kubernetes ConfigMap definition for Grafana data source configuration.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: thesis-autoscaling
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
