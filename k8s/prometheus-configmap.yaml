# Layer: observability/metrics + alerting rules.
# This is the Kubernetes ConfigMap definition for Prometheus configuration.

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: thesis-autoscaling
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/alert.rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: demo-app
        static_configs:
          - targets: ["demo-app:8000"]

      - job_name: agent-autoscaler
        static_configs:
          - targets: ["agent-autoscaler:8001"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]

  alert.rules.yml: |
    groups:
      - name: autoscaler-alerts
        rules:
          - alert: DemoAppHighErrorRate
            expr: (sum(rate(demo_app_requests_total{status_code=~"5.."}[2m])) / clamp_min(sum(rate(demo_app_requests_total[2m])), 1)) > 0.05
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Demo app error rate is high"
              description: "5xx error rate has stayed above 5% for more than 3 minutes."

          - alert: DemoAppHighP95Latency
            expr: histogram_quantile(0.95, sum(rate(demo_app_request_latency_seconds_bucket[2m])) by (le)) > 0.6
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Demo app p95 latency is high"
              description: "p95 latency has stayed above 600ms for more than 3 minutes."

          - alert: OpenAIBudgetExceeded
            expr: increase(openai_agent_requests_total{result="budget_exceeded"}[10m]) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "OpenAI budget guardrail has been triggered"
              description: "Autoscaler has started falling back due to OpenAI budget/token guardrails."

          - alert: AutoscalerVetoSurge
            expr: increase(autoscaler_decisions_total{veto="true"}[10m]) > 5
            for: 2m
            labels:
              severity: info
            annotations:
              summary: "Frequent vetoes detected"
              description: "Safety gate vetoed more than 5 decisions in the last 10 minutes."
