# This is the Kubernetes secret definition for storing the OpenAI API key.
# It defines a Secret resource that securely holds the API key in the
# thesis-autoscaling namespace.
#
# NOTE:
# - Use stringData for convenience so base64 encoding is not required.
# - The deploy script can auto-create/update this secret from OPENAI_API_KEY in
#   .env. This manifest is a fallback for clusters that manage secrets another
#   way.

apiVersion: v1
kind: Secret
metadata:
  name: openai-api-secret
  namespace: thesis-autoscaling
type: Opaque
stringData:
  OPENAI_API_KEY: ""
